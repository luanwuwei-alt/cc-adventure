<!DOCTYPE html>
<html>
<body>
<div id="game"></div>
<script type="importmap">
{
  "imports": {
    "phaser": "/node_modules/phaser/dist/phaser.esm.js"
  }
}
</script>
<script type="module">
import Phaser from "phaser";
console.log("Phaser loaded:", !!Phaser);
const config = {
  type: Phaser.AUTO,
  width: 400,
  height: 300,
  parent: "game",
  backgroundColor: "#ff0000",
  physics: { default: "arcade", arcade: { gravity: { y: 300 }, debug: false } },
  scene: {
    create: function() {
      console.log("Scene create called!");
      const g = this.add.graphics();
      g.fillStyle(0x00ff00);
      g.fillRect(50, 50, 100, 100);
      g.generateTexture("test", 100, 100);
      const sprite = this.physics.add.sprite(200, 150, "test");
      console.log("Sprite created:", !!sprite);
    }
  }
};
const game = new Phaser.Game(config);
console.log("Game created:", !!game);
</script>
</body>
</html>
