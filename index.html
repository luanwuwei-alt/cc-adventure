<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-container {
      position: relative;
    }
    #game-container canvas {
      display: block;
    }
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      pointer-events: none;
      z-index: 10;
    }
    #hud .hud-section {
      display: flex;
      gap: 24px;
    }
    #hud .hud-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #hud .coin-icon {
      color: #ffd700;
    }
    #game-over,
    #level-complete,
    #game-complete {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: 'Courier New', monospace;
      z-index: 20;
    }
    #game-over {
      background: rgba(0,0,0,0.7);
    }
    #level-complete {
      background: rgba(0,0,0,0.5);
    }
    #game-over h1,
    #level-complete h1,
    #game-complete h1 {
      font-size: 48px;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
      margin-bottom: 16px;
    }
    #game-over h1 { color: #ff4444; }
    #level-complete h1 { color: #44ff44; }
    #game-complete { background: rgba(0,0,0,0.6); }
    #game-complete h1 { color: #ffdd00; font-size: 40px; }
    #game-over .sub,
    #level-complete .sub {
      font-size: 18px;
      color: #ccc;
      margin-bottom: 8px;
    }
    #game-over .restart-hint,
    #level-complete .restart-hint {
      font-size: 14px;
      color: #999;
      margin-top: 16px;
    }
  </style>
  <script type="module" crossorigin src="/cc-adventure/assets/index-DeMfdD1z.js"></script>
</head>
<body>
<div id="js-test" style="position:fixed;top:0;left:0;z-index:99998;background:yellow;color:black;padding:5px;font-size:14px;font-family:monospace;">Loading JS...</div>
<div id="error-overlay" style="position:absolute;top:0;left:0;width:100%;padding:16px;background:rgba(0,0,0,0.85);color:#ff4444;font-family:monospace;font-size:13px;z-index:999;display:none;white-space:pre-wrap;word-break:break-all;pointer-events:auto;"></div>
    <div id="game-container">
    <div id="error-overlay" style="position:absolute;top:0;left:0;width:100%;padding:16px;background:rgba(0,0,0,0.85);color:#ff4444;font-family:monospace;font-size:13px;z-index:999;display:none;white-space:pre-wrap;word-break:break-all;pointer-events:auto;"></div>
    <div id="hud">
      <div class="hud-section">
        <div class="hud-item">
          <span>SCORE</span>
          <span id="score-display">0</span>
        </div>
        <div class="hud-item">
          <span class="coin-icon">●</span>
          <span id="coin-display">0</span>
        </div>
      </div>
      <div class="hud-section">
       <div class="hud-item">
         <span>LIVES</span>
         <span id="lives-display">3</span>
       </div>
        <div class="hud-item">
          <span>STAGE</span>
          <span id="level-display">1/5</span>
        </div>
      </div>
    </div>
    <div id="game-over">
      <h1>GAME OVER</h1>
      <div class="sub">Press SPACE or click to restart</div>
    </div>
   <div id="level-complete">
     <h1>LEVEL CLEAR!</h1>
     <div class="sub" id="final-score">Score: 0</div>
      <div class="restart-hint">Press SPACE for next stage</div>
    </div>
    <div id="game-complete">
      <h1>ALL CLEAR!</h1>
      <div class="sub" id="final-score">Score: 0</div>
      <div class="sub" id="total-coins">Coins: 0</div>
      <div class="restart-hint">Press SPACE to play again</div>
    </div>
  </div>
</body>
</html>
